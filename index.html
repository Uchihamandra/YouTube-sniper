<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SniperYT — Global Trending</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF0033;
    --dark: #0a0a0a;
    --card: #111111;
    --border: #222;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #FF0033;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--text);
  }
  .logo span { color: var(--red); }

  .api-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-bar input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    width: 260px;
    transition: border-color .2s;
  }
  .api-bar input:focus { outline: none; border-color: var(--red); }

  .btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN */
  main { max-width: 1300px; margin: 0 auto; padding: 36px 40px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .page-title span { color: var(--red); }
  .subtitle { color: var(--muted); font-size: 0.92rem; margin-bottom: 30px; }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 30px;
    align-items: center;
  }

  .controls select, .controls input[type=number] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: border-color .2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .controls select:focus, .controls input[type=number]:focus {
    outline: none; border-color: var(--red);
  }

  .select-wrap {
    position: relative;
    display: inline-block;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 0.8rem;
  }

  .controls input[type=number] { width: 80px; }

  .search-btn {
    padding: 9px 28px;
    font-size: 0.88rem;
  }

  /* STATUS */
  #status {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
    min-height: 20px;
  }
  #status.error { color: #ff6b6b; }
  #status.success { color: #6bff9e; }

  /* LOADING */
  .loader {
    display: none;
    text-align: center;
    padding: 60px;
  }
  .loader.active { display: block; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
    animation: fadeUp .35s ease both;
  }
  .card:hover {
    border-color: #333;
    transform: translateY(-3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .thumb-wrap {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #1a1a1a;
  }
  .thumb-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .3s;
  }
  .card:hover .thumb-wrap img { transform: scale(1.04); }

  .rank-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .duration-badge {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 0.72rem;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .card-body { padding: 14px; }

  .card-title {
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .channel-name {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stats {
    display: flex;
    gap: 14px;
    font-size: 0.75rem;
    color: #888;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat svg { flex-shrink: 0; }

  .card-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .category-tag {
    font-size: 0.7rem;
    background: rgba(255,0,51,0.1);
    color: var(--red);
    border: 1px solid rgba(255,0,51,0.2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .watch-btn {
    font-size: 0.72rem;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
  }
  .watch-btn:hover { border-color: var(--red); color: var(--red); }

  .copy-btn {
    font-size: 0.72rem;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .copy-btn:hover { border-color: #555; color: var(--text); }
  .copy-btn.copied { border-color: #6bff9e; color: #6bff9e; }

  .card-footer { gap: 6px; flex-wrap: wrap; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty .big { font-family: 'Bebas Neue'; font-size: 4rem; color: #1a1a1a; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.78rem;
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }

  @media (max-width: 700px) {
    header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .api-bar input { width: 180px; }
    main { padding: 24px 16px; }
    .page-title { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sniper<span>YT</span></div>
  <div class="api-bar">
    <input type="password" id="apiKey" placeholder="🔑 Masukkan YouTube API Key..." />
    <button class="btn" onclick="saveKey()">Simpan</button>
  </div>
</header>

<main>
  <div class="page-title">TRENDING <span>GLOBAL</span></div>
  <div class="subtitle">Pantau video trending YouTube dari seluruh penjuru dunia secara real-time.</div>

  <div class="controls">
    <div class="select-wrap">
      <select id="regionSelect">
        <option value="US">🇺🇸 United States</option>
        <option value="ID">🇮🇩 Indonesia</option>
        <option value="IN">🇮🇳 India</option>
        <option value="BR">🇧🇷 Brazil</option>
        <option value="GB">🇬🇧 United Kingdom</option>
        <option value="JP">🇯🇵 Japan</option>
        <option value="KR">🇰🇷 South Korea</option>
        <option value="DE">🇩🇪 Germany</option>
        <option value="FR">🇫🇷 France</option>
        <option value="MX">🇲🇽 Mexico</option>
        <option value="RU">🇷🇺 Russia</option>
        <option value="AU">🇦🇺 Australia</option>
        <option value="CA">🇨🇦 Canada</option>
        <option value="PH">🇵🇭 Philippines</option>
        <option value="TH">🇹🇭 Thailand</option>
        <option value="VN">🇻🇳 Vietnam</option>
        <option value="MY">🇲🇾 Malaysia</option>
        <option value="SG">🇸🇬 Singapore</option>
        <option value="EG">🇪🇬 Egypt</option>
        <option value="NG">🇳🇬 Nigeria</option>
        <option value="ZA">🇿🇦 South Africa</option>
        <option value="SA">🇸🇦 Saudi Arabia</option>
        <option value="TR">🇹🇷 Turkey</option>
        <option value="IT">🇮🇹 Italy</option>
        <option value="ES">🇪🇸 Spain</option>
        <option value="AR">🇦🇷 Argentina</option>
        <option value="CO">🇨🇴 Colombia</option>
        <option value="PL">🇵🇱 Poland</option>
        <option value="NL">🇳🇱 Netherlands</option>
        <option value="SE">🇸🇪 Sweden</option>
        <option value="NO">🇳🇴 Norway</option>
        <option value="DK">🇩🇰 Denmark</option>
        <option value="FI">🇫🇮 Finland</option>
        <option value="CH">🇨🇭 Switzerland</option>
        <option value="AT">🇦🇹 Austria</option>
        <option value="BE">🇧🇪 Belgium</option>
        <option value="PT">🇵🇹 Portugal</option>
        <option value="CZ">🇨🇿 Czech Republic</option>
        <option value="HU">🇭🇺 Hungary</option>
        <option value="RO">🇷🇴 Romania</option>
        <option value="GR">🇬🇷 Greece</option>
        <option value="UA">🇺🇦 Ukraine</option>
        <option value="AE">🇦🇪 UAE</option>
        <option value="IL">🇮🇱 Israel</option>
        <option value="PK">🇵🇰 Pakistan</option>
        <option value="BD">🇧🇩 Bangladesh</option>
        <option value="NP">🇳🇵 Nepal</option>
      </select>
    </div>

    <div class="select-wrap">
      <select id="categorySelect">
        <option value="0">📋 Semua Kategori</option>
        <option value="1">🎬 Film & Animasi</option>
        <option value="2">🚗 Otomotif</option>
        <option value="10">🎵 Musik</option>
        <option value="15">🐾 Hewan Peliharaan</option>
        <option value="17">⚽ Olahraga</option>
        <option value="20">🎮 Gaming</option>
        <option value="22">👥 Orang & Blog</option>
        <option value="23">😂 Komedi</option>
        <option value="24">🎭 Hiburan</option>
        <option value="25">📰 Berita & Politik</option>
        <option value="26">💡 Cara & Gaya</option>
        <option value="27">🎓 Edukasi</option>
        <option value="28">💻 Sains & Teknologi</option>
        <option value="29">🎨 Nirlaba</option>
        <option value="43">🔵 Show</option>
      </select>
    </div>

    <input type="number" id="maxResults" value="20" min="5" max="50" title="Jumlah video" />

    <button class="btn search-btn" id="searchBtn" onclick="fetchTrending()">
      🔍 Cari Trending
    </button>
  </div>

  <div id="status"></div>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:.88rem">Mengambil data trending...</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="emptyState">
    <div class="big">YT</div>
    <p>Masukkan API Key lalu klik <strong>Cari Trending</strong></p>
  </div>
</main>

<footer>
  SniperYT — Powered by YouTube Data API v3
</footer>

<script>
const CATEGORIES = {
  "0":"Semua","1":"Film & Animasi","2":"Otomotif","10":"Musik","15":"Hewan",
  "17":"Olahraga","20":"Gaming","22":"Vlog","23":"Komedi","24":"Hiburan",
  "25":"Berita","26":"Gaya Hidup","27":"Edukasi","28":"Teknologi","29":"Nirlaba","43":"Show"
};

let apiKey = localStorage.getItem('sniperyt_key') || '';
if (apiKey) document.getElementById('apiKey').value = apiKey;

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('API Key tidak boleh kosong!', 'error'); return; }
  localStorage.setItem('sniperyt_key', apiKey);
  setStatus('✅ API Key tersimpan!', 'success');
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function formatNum(n) {
  if (!n) return '–';
  n = parseInt(n);
  if (n >= 1e9) return (n/1e9).toFixed(1)+'M jt';
  if (n >= 1e6) return (n/1e6).toFixed(1)+' jt';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'rb';
  return n.toString();
}

function parseDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return Math.floor(diff/60)+' menit lalu';
  if (diff < 86400) return Math.floor(diff/3600)+' jam lalu';
  if (diff < 2592000) return Math.floor(diff/86400)+' hari lalu';
  return Math.floor(diff/2592000)+' bulan lalu';
}

async function fetchTrending() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('❌ Masukkan API Key terlebih dahulu!', 'error'); return; }

  const region = document.getElementById('regionSelect').value;
  const category = document.getElementById('categorySelect').value;
  const maxResults = Math.min(50, Math.max(1, parseInt(document.getElementById('maxResults').value)||20));

  document.getElementById('loader').classList.add('active');
  document.getElementById('grid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('searchBtn').disabled = true;
  setStatus('');

  try {
    // Step 1: get trending IDs + snippet
    let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${region}&maxResults=${maxResults}&key=${apiKey}`;
    if (category !== '0') url += `&videoCategoryId=${category}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const items = data.items || [];
    if (!items.length) { setStatus('Tidak ada video trending ditemukan.', 'error'); return; }

    const regionName = document.getElementById('regionSelect').selectedOptions[0].text;
    setStatus(`✅ ${items.length} video trending di ${regionName}`, 'success');

    renderCards(items);
  } catch (e) {
    setStatus('❌ Error: ' + e.message, 'error');
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    document.getElementById('loader').classList.remove('active');
    document.getElementById('searchBtn').disabled = false;
  }
}

function renderCards(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  items.forEach((item, i) => {
    const s = item.snippet;
    const st = item.statistics;
    const cd = item.contentDetails;
    const videoId = item.id;
    const thumb = s.thumbnails?.maxres?.url || s.thumbnails?.high?.url || s.thumbnails?.medium?.url || '';
    const catLabel = CATEGORIES[s.categoryId] || 'Lainnya';
    const dur = parseDuration(cd?.duration);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${escHtml(s.title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect fill=%22%231a1a1a%22 width=%22320%22 height=%22180%22/><text fill=%22%23444%22 font-size=%2240%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 x=%22160%22 y=%2290%22>▶</text></svg>'" />
        <div class="rank-badge">#${i+1}</div>
        ${dur ? `<div class="duration-badge">${dur}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(s.title)}</div>
        <div class="channel-name">📺 ${escHtml(s.channelTitle)}</div>
        <div class="stats">
          <div class="stat">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${formatNum(st?.viewCount)}
          </div>
          <div class="stat">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
            ${formatNum(st?.likeCount)}
          </div>
          <div class="stat">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${formatNum(st?.commentCount)}
          </div>
          <div class="stat" style="margin-left:auto">🕒 ${timeAgo(s.publishedAt)}</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="category-tag">${catLabel}</span>
        <div style="display:flex;gap:6px">
          <button class="copy-btn" onclick="copyText('https://youtube.com/watch?v=${videoId}', this)" title="Copy link">🔗 Link</button>
          <button class="copy-btn" onclick="copyText('${escHtml(s.title).replace(/'/g,"\\'")}', this)" title="Copy judul">📋 Judul</button>
          <a class="watch-btn" href="https://youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">▶ Tonton</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1800);
  });
}
</script>
</body>
</html>
